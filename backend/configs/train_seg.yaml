# YOLOv8 实例分割训练 — 数据集需为多边形标签（可先运行 scripts/convert_detect_labels_to_seg.py）。
# 从 backend/ 运行: python models/train_seg.py

model: yolov8m-seg.pt
data: data/splits_seg/data.yaml

epochs: 100
batch: 16
imgsz: 640
device: "0"
workers: 4

optimizer: AdamW
lr0: 0.001
lrf: 0.01
momentum: 0.937
weight_decay: 0.0005
warmup_epochs: 3.0

patience: 20
exist_ok: true
plots: true
save: true

project: runs/segment
# After refreshing data, use a new name so previous runs stay untouched.
name: veg_seg_v5
