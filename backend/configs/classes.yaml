# Unified 10-class detection labels (shared by scripts/ and training configs).
# ds1: FOOD-INGREDIENTS (Roboflow names, mixed English / regional).
# ds2: Food ingredient recognition (lowercase names).
# Garlic and chilli are excluded: typical serving amounts yield negligible macro totals for nutrition estimation.
nc: 10
names:
  0: bell_pepper
  1: tomato
  2: onion
  3: potato
  4: mushroom
  5: carrot
  6: broccoli
  7: cucumber
  8: corn
  9: egg

# Raw Roboflow class name -> canonical name above (builds raw_class_id -> unified_id).
sources:
  ds1:
    path: data/raw/FOOD-INGREDIENTS dataset.v4i.yolov8
    file_prefix: ds1_
    # Capsicum == ds2 "bell pepper"
    raw_to_canonical:
      Capsicum: bell_pepper
      Tomato: tomato
      Onion: onion
      Potato: potato
      Mushroom: mushroom
      Carrot: carrot
      Broccoli: broccoli
      Cucumber: cucumber
      Corn: corn
      Egg: egg
  ds2:
    path: data/raw/Food ingredient recognition.v4i.yolov8
    file_prefix: ds2_
    raw_to_canonical:
      bell pepper: bell_pepper
      tomato: tomato
      onion: onion
      potato: potato
      mushroom: mushroom
      carrot: carrot
      broccoli: broccoli
      cucumber: cucumber
      corn: corn
      egg: egg
